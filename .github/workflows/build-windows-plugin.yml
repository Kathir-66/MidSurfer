name: Build Windows Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  PARAVIEW_VERSION: 5.11.2
  PARAVIEW_GIT_TAG: v5.11.2

jobs:
  build-windows-plugin:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Clone ParaView source
        shell: pwsh
        run: |
          $srcDir = Join-Path $env:RUNNER_TEMP "paraview-src"
          git clone --branch $env:PARAVIEW_GIT_TAG --depth 1 https://gitlab.kitware.com/paraview/paraview.git $srcDir
          git -C $srcDir submodule update --init --recursive --depth 1
          "PARAVIEW_SOURCE_DIR=$srcDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure ParaView
        shell: pwsh
        run: |
          $buildDir = Join-Path $env:RUNNER_TEMP "paraview-build"
          $installDir = Join-Path $env:RUNNER_TEMP "paraview-install"
          cmake -S $env:PARAVIEW_SOURCE_DIR -B $buildDir -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=$installDir `
            -DBUILD_SHARED_LIBS=ON `
            -DPARAVIEW_BUILD_TESTING=OFF `
            -DPARAVIEW_ENABLE_EXAMPLES=OFF `
            -DPARAVIEW_USE_MPI=OFF `
            -DPARAVIEW_USE_PYTHON=OFF `
            -DPARAVIEW_USE_QT=OFF `
            -DPARAVIEW_INSTALL_DEVELOPMENT_FILES=ON
          "PARAVIEW_BUILD_DIR=$buildDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PARAVIEW_INSTALL_ROOT=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and install ParaView
        shell: pwsh
        run: |
          cmake --build $env:PARAVIEW_BUILD_DIR --config Release --target install --parallel

      - name: Set ParaView_DIR
        id: paraview
        shell: pwsh
        run: |
          $dir = $env:PARAVIEW_BUILD_DIR
          "dir=$dir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "Resolved ParaView_DIR: $dir"

      - name: Configure MidSurfer
        shell: pwsh
        run: |
          cmake -S "$env:GITHUB_WORKSPACE" -B "$env:GITHUB_WORKSPACE\build" -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DParaView_DIR="${{ steps.paraview.outputs.dir }}"

      - name: Debug ParaView package layout on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "Searching build tree for ParaView config files"
          Get-ChildItem -Path $env:PARAVIEW_BUILD_DIR -Recurse -Include 'ParaViewConfig.cmake','paraview-config.cmake' -File -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "Searching install tree for ParaView config files"
          Get-ChildItem -Path $env:PARAVIEW_INSTALL_ROOT -Recurse -Include 'ParaViewConfig.cmake','paraview-config.cmake' -File -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Build MidSurfer
        shell: pwsh
        run: |
          cmake --build "$env:GITHUB_WORKSPACE\build" --config Release --verbose

      - name: Collect plugin artifacts
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP "midsurfer-artifact"
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          $patterns = @('MidSurfer*.dll', 'MidSurfer*.plugins', 'MidSurfer*.json', 'MidSurfer*.xml')
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE\build" -Recurse -Filter $pattern -File -ErrorAction SilentlyContinue |
              Copy-Item -Destination $artifactRoot -Force
          }

          if (-not (Get-ChildItem -Path $artifactRoot -File -ErrorAction SilentlyContinue)) {
            throw "No MidSurfer plugin artifacts were found under the build directory."
          }

          Get-ChildItem -Path $artifactRoot -File | Select-Object FullName

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidSurfer-windows-paraview-${{ env.PARAVIEW_VERSION }}
          path: ${{ runner.temp }}\midsurfer-artifact\*
          if-no-files-found: error
